{% extends 'allocation/base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card border-0 shadow-sm">
            <div class="card-body text-center p-4">
                <i class="bi bi-door-open fs-1 text-primary"></i>
                <h5 class="mt-3 fw-bold">Apply for Room?</h5>
                <p class="text-muted">
                    Hi <strong>{{ student.name }}</strong>, you are about to submit a room allocation request.
                    The admin will review and allocate a room for you.
                </p>
                <p class="text-muted small">Do you want to continue?</p>

                <div class="d-flex justify-content-center gap-3 mt-3">
                    <!-- Yes confirms the apply -->
                    <form method="post" action="{% url 'apply_for_room' %}">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-dark">
                            <i class="bi bi-check-circle"></i> Yes, Apply
                        </button>
                    </form>
                    <!-- No goes back to dashboard -->
                    <a href="{% url 'student_dashboard' %}" class="btn btn-outline-secondary">
                        <i class="bi bi-x-circle"></i> No, Cancel
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
