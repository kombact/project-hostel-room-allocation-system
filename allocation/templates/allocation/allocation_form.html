{% extends 'allocation/base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-white fw-semibold">Allocate Room</div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                            <div class="text-danger small">{{ field.errors }}</div>
                        {% endif %}
                    </div>
                    {% endfor %}
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-dark">Allocate</button>
                        <a href="{% url 'allocation_list' %}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>

document.addEventListener('DOMContentLoaded', function () {

    const studentDropdown = document.getElementById('id_student');
    const roomDropdown = document.getElementById('id_room');

    studentDropdown.addEventListener('change', function () {

        const studentId = this.value;

        fetch(`/ajax/load-rooms/?student=${studentId}`)

            .then(response => response.json())

            .then(data => {

                roomDropdown.innerHTML = '';

                data.forEach(room => {

                    const option = document.createElement('option');

                    option.value = room.id;

                    option.textContent =
                        `Room ${room.room_number} - Block ${room.block}`;

                    roomDropdown.appendChild(option);

                });

            });

    });

});

</script>
{% endblock %}
